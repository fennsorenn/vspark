<svg xmlns="http://www.w3.org/2000/svg" width="460" height="180" viewBox="0 0 460 180" font-family="system-ui, sans-serif" role="img" aria-label="Linear, step and bezier easing curves">
  <line x1="60" y1="30" x2="60" y2="150" stroke="#5b6472" stroke-width="1.3"/>
  <line x1="60" y1="150" x2="420" y2="150" stroke="#5b6472" stroke-width="1.3"/>
  <!-- linear -->
  <path d="M60,150 L420,30" fill="none" stroke="#98c379" stroke-width="2.4"/>
  <!-- step -->
  <path d="M60,150 H240 V30 H420" fill="none" stroke="#e5c07b" stroke-width="2.4"/>
  <!-- bezier / ease -->
  <path d="M60,150 C240,150 240,30 420,30" fill="none" stroke="#61afef" stroke-width="2.4"/>
  <circle cx="60" cy="150" r="3.5" fill="#c8d2e0"/>
  <circle cx="420" cy="30" r="3.5" fill="#c8d2e0"/>
</svg>
