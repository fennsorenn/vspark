<svg xmlns="http://www.w3.org/2000/svg" width="460" height="180" viewBox="0 0 460 180" font-family="system-ui, sans-serif" role="img" aria-label="Two logic nodes connected by an event wire and a value wire">
  <defs>
    <marker id="ev" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#e5a06b"/></marker>
  </defs>
  <style>
    .node{fill:#222831;stroke:#3a4150;stroke-width:1.4}
    .head{fill:#2d3647}
  </style>
  <!-- node A -->
  <rect class="node" x="40" y="50" width="130" height="80" rx="6"/>
  <rect class="head" x="40" y="50" width="130" height="22" rx="6"/>
  <rect class="head" x="40" y="61" width="130" height="11"/>
  <!-- node B -->
  <rect class="node" x="290" y="50" width="130" height="80" rx="6"/>
  <rect class="head" x="290" y="50" width="130" height="22" rx="6"/>
  <rect class="head" x="290" y="61" width="130" height="11"/>
  <!-- event wire (push, arrow) -->
  <path d="M170,90 C220,90 240,90 290,90" fill="none" stroke="#e5a06b" stroke-width="2.4" marker-end="url(#ev)"/>
  <circle cx="170" cy="90" r="5" fill="#e5a06b"/>
  <circle cx="290" cy="90" r="5" fill="#e5a06b"/>
  <!-- value wire (pull, no arrow) -->
  <path d="M170,114 C220,114 240,114 290,114" fill="none" stroke="#6ea8fe" stroke-width="2.4"/>
  <circle cx="170" cy="114" r="5" fill="#6ea8fe"/>
  <circle cx="290" cy="114" r="5" fill="#6ea8fe"/>
</svg>
