<svg xmlns="http://www.w3.org/2000/svg" width="520" height="230" viewBox="0 0 520 230" font-family="system-ui, sans-serif" role="img" aria-label="Perspective versus orthographic projection">
  <style>
    .rail{stroke:#8a93a6;stroke-width:1.5;fill:none}
    .accent{stroke:#6ea8fe;stroke-width:2;fill:none}
    .post{fill:#2b3242;stroke:#6ea8fe;stroke-width:1.5}
    .cam{fill:#2b3242;stroke:#8a93a6;stroke-width:1.5}
    .lbl{fill:#9aa6ba;font-size:12px;text-anchor:middle}
  </style>

  <!-- LEFT: perspective — rails converge, far objects look smaller -->
  <rect class="cam" x="16" y="103" width="22" height="24" rx="3"/>
  <rect class="cam" x="38" y="108" width="8" height="14"/>
  <path class="rail" d="M50,70 L250,108 M50,160 L250,122"/>
  <!-- near post (tall) and far post (short) — same real size -->
  <rect class="post" x="92" y="86" width="16" height="58" rx="2"/>
  <rect class="post" x="196" y="104" width="11" height="26" rx="2"/>
  <text class="lbl" x="135" y="185">◀ A ▶</text>

  <!-- RIGHT: orthographic — rails parallel, sizes preserved -->
  <rect class="cam" x="286" y="103" width="22" height="24" rx="3"/>
  <rect class="cam" x="308" y="108" width="8" height="14"/>
  <path class="rail" d="M322,80 L512,80 M322,150 L512,150"/>
  <rect class="post" x="360" y="92" width="15" height="46" rx="2"/>
  <rect class="post" x="470" y="92" width="15" height="46" rx="2"/>
  <text class="lbl" x="405" y="185">◀ B ▶</text>
</svg>
