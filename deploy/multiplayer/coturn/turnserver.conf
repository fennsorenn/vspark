# coturn config for the vspark multiplayer bundle — STUN + TURN with load caps
# so a relayed session can't saturate the host. The shared secret, realm and
# external IP are passed on the command line (from .env); everything here is the
# static hardening + capacity policy.
#
# TURN only engages when direct/STUN hole-punching fails, so steady-state load
# is just the strict-NAT/CGNAT minority — these caps guard against abuse/spikes.

# Listening ports (standard STUN/TURN).
listening-port=3478
# tls-listening-port=5349            # enable + set cert/pkey below for turns:

# Bounded relay port range — keep it small; cap concurrent relayed sessions.
min-port=49160
max-port=49200

# --- load caps (the point of self-hosting our own TURN safely) ---
# Global ceiling on relayed throughput (kbps). Tune to a fraction of your uplink.
bps-capacity=8000
# Per-allocation cap (bytes/sec) so one session can't hog the ceiling.
max-bps=500000
# Cap concurrent allocations per user (peer).
user-quota=12
# Cap total concurrent allocations across the server.
total-quota=100

# --- security hardening ---
fingerprint
stale-nonce=600
no-cli
no-multicast-peers
# Refuse relaying to private/loopback ranges (no SSRF via TURN).
no-loopback-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
# Drop legacy TLS if turns: is enabled.
no-tlsv1
no-tlsv1_1

# Quieten logging to stdout (container-friendly).
log-file=stdout
simple-log
