name: Release

# Fires after a PR merges to main. Two jobs:
#   1. tag — reads the merged PR's release: label, bumps the latest v* tag
#      accordingly, creates and pushes the tag.
#   2. release — matrix build (linux + windows): bundle, package, attach
#      to a GitHub Release named after the tag.
#
# This used to be split across tag.yml (push tag) and release.yml
# (push: tags trigger). That split didn't work: tags created via GITHUB_TOKEN
# from a workflow don't trigger downstream workflows, so the release never
# fired automatically. Folding both into one workflow side-steps the
# cross-workflow trigger entirely.
#
# Re-running on the same merged PR is safe-ish:
#   - The tag step uses `git tag -a` which fails if the tag already exists.
#     If you ever need to re-run, delete the tag first (locally and remote).
#   - The release step uses softprops/action-gh-release which updates an
#     existing release with the same tag.

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  tag:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `git tag -l` finds prior tags.
          fetch-depth: 0

      - name: Determine bump level from PR label
        id: bump
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          if echo "$LABELS" | jq -e 'any(. == "release:major")' >/dev/null; then
            echo "level=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | jq -e 'any(. == "release:minor")' >/dev/null; then
            echo "level=minor" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | jq -e 'any(. == "release:patch")' >/dev/null; then
            echo "level=patch" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Merged PR has no release: label — ci.yml's release-label check should have blocked this"
            exit 1
          fi

      - name: Compute next version
        id: version
        run: |
          last=$(git tag -l 'v*' --sort=-v:refname | head -n 1)
          if [ -z "$last" ]; then
            last="v0.0.0"
          fi
          echo "Last tag: $last"

          ver="${last#v}"
          ver="${ver%%-*}"
          IFS='.' read -r major minor patch <<< "$ver"

          case "${{ steps.bump.outputs.level }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          next="v${major}.${minor}.${patch}"
          echo "Next tag: $next"
          echo "tag=$next" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"

  release:
    needs: tag
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win-x64
            node_binary: node.exe
            start_script: start.bat
          - os: ubuntu-latest
            platform: linux-x64
            node_binary: node
            start_script: start.sh

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter frontend build

      - name: Build backend bundle
        run: node bundle.mjs
        working-directory: packages/backend

      - name: Write version.json
        shell: bash
        env:
          TAG: ${{ needs.tag.outputs.tag }}
        run: |
          VERSION="${TAG#v}"
          if [[ "$TAG" =~ -alpha ]]; then
            CHANNEL="experimental"
          elif [[ "$TAG" =~ -beta ]]; then
            CHANNEL="recent"
          else
            CHANNEL="stable"
          fi
          echo "{\"version\":\"$VERSION\",\"channel\":\"$CHANNEL\"}" > packages/backend/dist/version.json

      - name: Download Node.js LTS binary
        shell: bash
        run: |
          NODE_VERSION="22.16.0"
          if [[ "${{ matrix.platform }}" == "win-x64" ]]; then
            curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-win-x64.zip" -o node-dist.zip
            unzip -j node-dist.zip "node-v${NODE_VERSION}-win-x64/node.exe" -d packages/backend/dist/
          else
            curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.gz" \
              | tar xz -C packages/backend/dist/ --strip-components=2 \
              "node-v${NODE_VERSION}-linux-x64/bin/node"
          fi

      # The start script supervises the server: it runs it in a loop, and when
      # the server exits with code 42 (UPDATE_EXIT_CODE in update.ts) it applies
      # the downloaded update zip in place and relaunches — all in the SAME
      # console, so the terminal the user launched from is never orphaned. Any
      # other exit code stops normally. The zip is written by the server to
      # <parent-of-vspark>/vspark-update.zip (downloadZipPath() in update.ts).
      - name: Write start script
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "win-x64" ]]; then
            cat > packages/backend/dist/start.bat << 'SCRIPT'
          @echo off
          setlocal
          set "DIR=%~dp0"
          set "ZIP=%DIR%..\vspark-update.zip"
          rem node runs in the foreground so console Ctrl-C / close reaches it
          rem directly (cmd has no trap-style signal forwarding); the server's
          rem exit code below drives the update/restart logic.
          :loop
          "%DIR%node.exe" "%DIR%bundle.cjs"
          if errorlevel 42 if not errorlevel 43 (
            echo [update] applying update...
            powershell -NoProfile -Command "Expand-Archive -Force -Path '%ZIP%' -DestinationPath '%DIR%..'"
            del "%ZIP%" 2>nul
            goto loop
          )
          endlocal
          SCRIPT
          else
            cat > packages/backend/dist/start.sh << 'SCRIPT'
          #!/bin/sh
          DIR="$(cd "$(dirname "$0")" && pwd)"
          ZIP="$DIR/../vspark-update.zip"
          # Run node in the background and forward TERM/INT to it, so killing or
          # Ctrl-C-ing this supervisor cleanly stops the server instead of
          # orphaning it. The trap exits the loop (a deliberate stop must not
          # relaunch); only node's own exit code drives the update/restart logic.
          # Forward TERM/INT to the server and stop: killing or Ctrl-C-ing this
          # supervisor cleanly shuts the server down instead of orphaning it.
          # The handler exits, so a deliberate stop never relaunches; only the
          # server's own exit code (below) drives the update/restart logic.
          child=""
          trap '[ -n "$child" ] && kill -TERM "$child" 2>/dev/null; wait "$child" 2>/dev/null; exit 143' TERM INT
          while :; do
            "$DIR/node" "$DIR/bundle.cjs" &
            child=$!
            # On a trapped signal the handler runs and exits, so control only
            # returns here on the server's own exit — $? is then its real code.
            wait "$child"
            code=$?
            if [ "$code" -eq 42 ]; then
              echo "[update] applying update..."
              unzip -o "$ZIP" -d "$DIR/.." && rm -f "$ZIP"
              continue
            fi
            exit "$code"
          done
          SCRIPT
            chmod +x packages/backend/dist/start.sh
          fi

      - name: Package release zip
        shell: bash
        run: |
          mkdir -p release/vspark
          cp packages/backend/dist/bundle.cjs release/vspark/
          cp packages/backend/dist/node-sqlite3-wasm.wasm release/vspark/
          cp -r packages/backend/dist/public release/vspark/
          cp packages/backend/dist/${{ matrix.node_binary }} release/vspark/
          cp packages/backend/dist/${{ matrix.start_script }} release/vspark/
          cp packages/backend/dist/version.json release/vspark/
          cd release
          if [[ "${{ matrix.platform }}" == "win-x64" ]]; then
            powershell -Command "Compress-Archive -Path vspark -DestinationPath vspark-${{ matrix.platform }}.zip"
          else
            zip -r vspark-${{ matrix.platform }}.zip vspark/
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          files: release/vspark-${{ matrix.platform }}.zip
          prerelease: ${{ contains(needs.tag.outputs.tag, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
