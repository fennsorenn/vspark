name: CI

# Runs on every PR targeting main. Two required checks:
#   - build: mirrors the prep steps from release.yml (lint, build, backend
#     bundle) so a PR that wouldn't ship a release can't merge. Catches
#     regressions like missing esbuild alias entries before they reach main.
#   - release-label: refuses merge unless the PR carries exactly one of
#     release:patch / release:minor / release:major. tag.yml reads this
#     label after merge to decide the semver bump.
#
# `labeled`/`unlabeled` are included so the release-label check re-runs the
# moment a label is added (release labels are applied via REST *after* the PR
# is created, so the initial run would otherwise see no label and fail with no
# way to retrigger). The build job skips on label events — only the label
# check needs to react to them.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches:
      - main

jobs:
  build:
    # No need to rebuild on label changes — only release-label cares about those.
    if: github.event.action != 'labeled' && github.event.action != 'unlabeled'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Bundle backend
        run: pnpm --filter @vspark/backend bundle

  release-label:
    runs-on: ubuntu-latest
    steps:
      - name: "Require exactly one release: label"
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          count=$(echo "$LABELS" | jq '[.[] | select(. == "release:patch" or . == "release:minor" or . == "release:major")] | length')
          if [ "$count" -eq 0 ]; then
            echo "::error::PR must carry one of: release:patch, release:minor, release:major"
            exit 1
          fi
          if [ "$count" -gt 1 ]; then
            echo "::error::PR carries multiple release: labels — pick one"
            exit 1
          fi
          echo "OK — exactly one release label present"
