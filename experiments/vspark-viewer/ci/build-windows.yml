# Builds the standalone Windows test apps under experiments/ into double-click
# portable .exe files and uploads them as downloadable artifacts.
#
# This file can't be committed under .github/workflows/ by the bot (push creds
# lack the `workflow` scope). Enable it once: copy this file to
# .github/workflows/build-windows.yml (GitHub web UI "Add file", or a commit
# from an account with `workflow` scope). Then run it from the Actions tab.
name: build viewer experiments (Windows)

on:
  workflow_dispatch:
  push:
    branches:
      - experiments/viewer-spout
    paths:
      - experiments/**
      - .github/workflows/build-windows.yml

jobs:
  vspark-viewer:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: experiments/vspark-viewer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Best-effort: build the Spout native addon and drop it next to the app so
      # electron-builder bundles it. If anything here fails, we still ship the
      # viewer (the FPS/throttle test works without Spout). Check this step's log
      # if Spout doesn't show up in the .exe.
      - name: Build electron_spout.node (best-effort)
        continue-on-error: true
        shell: bash
        # VCPKG_INSTALLATION_ROOT is provided via the Actions env context rather
        # than the raw shell env: Git Bash on windows-latest does not reliably
        # inherit it, which previously left the toolchain path as a bare
        # "/scripts/buildsystems/vcpkg.cmake" and failed CMake configure. We pass
        # it explicitly and fall back to the known image path (C:\vcpkg).
        env:
          VCPKG_ROOT: ${{ env.VCPKG_INSTALLATION_ROOT }}
        run: |
          set -euo pipefail
          # Resolve vcpkg root, falling back to the documented runner-image path,
          # then convert C:\... -> C:/... so CMake accepts the toolchain path.
          VCPKG_ROOT="${VCPKG_ROOT:-/c/vcpkg}"
          TOOLCHAIN="$(cygpath -m "$VCPKG_ROOT" 2>/dev/null || echo "$VCPKG_ROOT")/scripts/buildsystems/vcpkg.cmake"
          echo "Using vcpkg toolchain: $TOOLCHAIN"
          if [ ! -f "$TOOLCHAIN" ]; then
            echo "vcpkg toolchain not found at $TOOLCHAIN — skipping Spout build."
            exit 1
          fi
          git clone --depth 1 https://github.com/reitowo/electron-spout spout-src
          cd spout-src
          npm install
          npx cmake-js compile \
            --runtime=electron --runtime-version=30.0.1 --arch=x64 \
            --CDCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            --CDCMAKE_MSVC_RUNTIME_LIBRARY='MultiThreaded$<$<CONFIG:Debug>:Debug>DLL'
          # cmake-js emits the addon as "electron-spout.node" (hyphen), but the
          # app requires "./electron_spout.node" (underscore) — copy to that name.
          # Accept either spelling as the source and verify the file landed.
          SRC="$(find build -name 'electron[-_]spout.node' -print -quit)"
          if [ -z "$SRC" ]; then
            echo "Built addon not found under build/ — Spout will be absent."
            exit 1
          fi
          cp "$SRC" ../electron_spout.node
          ls -l ../electron_spout.node

      - name: Report whether Spout addon was built
        shell: bash
        run: |
          if [ -f electron_spout.node ]; then echo "Spout addon present — .exe will include Spout."; \
          else echo "Spout addon NOT built — .exe will run WITHOUT Spout (throttle test still works)."; fi

      - run: npm install
      - run: npm run dist
      - uses: actions/upload-artifact@v4
        with:
          name: vspark-viewer-portable
          path: experiments/vspark-viewer/dist/*.exe
          if-no-files-found: error

  headless-test:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: experiments/headless-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run dist
      - uses: actions/upload-artifact@v4
        with:
          name: headless-test-portable
          path: experiments/headless-test/dist/*.exe
          if-no-files-found: error
